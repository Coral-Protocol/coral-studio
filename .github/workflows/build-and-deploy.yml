---
name: "Build and deploy bundle"
on:  # yamllint disable-line rule:truthy
  push:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref_type }}-${{ github.ref_name }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      artifact_name: coral-console_${{ steps.vars.outputs.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            substituters = https://cache.nixos.org/
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            keep-env-derivations = true
            keep-derivations = true
            keep-outputs = true
            experimental-features = nix-command flakes

      - name: Restore and save Nix store and npm cache
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('yarn.lock', 'flake.lock') }}
          restore-prefixes-first-match: |
            nix-${{ runner.os }}-
          # do purge caches
          purge: true
          # purge all versions of the cache
          purge-prefixes: nix-${{ runner.os }}-
          # except the primary key, if it exists
          purge-primary-key: never
          # created more than 7 days ago relative to the start of the `Post Restore` phase
          purge-created: 604800
          # and collect garbage in the Nix store until it reaches this size in bytes
          gc-max-store-size: 8000000000

      - name: Build bundle
        run: |
          set -eu

          BUNDLE_DIR=$(nix build --no-link --print-out-paths .#)
          mkdir output/
          cp -r $BUNDLE_DIR/* output/
      - name: Compute output name
        id: vars
        shell: bash
        run: |
          set -eu
          # Determine the branch/ref name depending on event type
          if [ "${{ github.ref_type }}" = "tag" ]; then
            REF="${{ github.ref_name }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            REF="${{ github.head_ref }}"
          else
            REF="${{ github.ref_name }}"
          fi
          # Normalize branch/ref name
          REF_SAFE=$(echo "$REF" \
            | tr '[:upper:]' '[:lower:]' \
            | tr '/' '-' \
            | tr -cs 'a-z0-9._-' '-' \
            | sed 's/^-*//;s/-*$//')
          echo "ref=$REF_SAFE" >> "$GITHUB_OUTPUT"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coral-console_${{ steps.vars.outputs.ref }}
          path: |
            ./output/*
      # - name: Release
      #   uses: softprops/action-gh-release@v2
      #   if: github.ref_type == 'tag'
      #   with:
      #     files: ./coral-console_${{ steps.vars.outputs.ref }}.zip
  release-please:
    name: Execute release chores

    permissions:
      contents: write
      issues: write
      pull-requests: write

    runs-on: ubuntu-latest
    needs: [build]

    outputs:
      release_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
  publish:
    name: Push release

    permissions:
      contents: write

    runs-on: ubuntu-latest
    needs:
      - build
      - release-please

    if: needs.release-please.outputs.release_created && needs.release-please.outputs.tag_name

    steps:
      - uses: actions/download-artifact@v5
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: artifact/
      - name: Zip bundle
        run: |
          set -eu
          cd ./artifact
          zip -r ../${{ needs.build.outputs.artifact_name }}.zip *

      - name: Display structure of downloaded files
        run: ls -R

      - name: Publish release artifacts to GitHub release
        uses: svenstaro/upload-release-action@v2
        if: needs.release-please.outputs.release_created
        with:
          file_glob: true
          tag: ${{ needs.release-please.outputs.tag_name }}
          file: ${{ needs.build.outputs.artifact_name }}.zip
          overwrite: true

